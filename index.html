<title>Test Tema 5 — Organización Territorial del Estado | Opositar en Valencia</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--naranja:#d97706;--naranja-claro:#fef3c7;--naranja-borde:#f59e0b;--azul-oscuro:#1e293b;--texto:#374151;--texto-suave:#6b7280;--borde:#e5e7eb;--fondo:#fafaf9;--blanco:#ffffff;--verde:#166534;--verde-bg:#f0fdf4;--verde-borde:#86efac;--rojo:#991b1b;--rojo-bg:#fef2f2;--rojo-borde:#fca5a5;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Source Sans 3',sans-serif;background:var(--fondo);color:var(--texto);min-height:100vh;font-size:16px;line-height:1.6;}
  header{background:var(--blanco);border-bottom:1px solid var(--borde);}
  .header-top{max-width:860px;margin:0 auto;padding:1.4rem 1.5rem 1rem;display:flex;align-items:flex-start;gap:1.2rem;}
  .header-logo{width:48px;height:48px;border-radius:8px;object-fit:contain;flex-shrink:0;}
  .header-textos{flex:1;}
  .header-site{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--naranja);font-weight:600;margin-bottom:3px;}
  .header-titulo{font-family:'Lora',serif;font-size:clamp(1.2rem,3.5vw,1.7rem);font-weight:700;color:var(--azul-oscuro);line-height:1.2;}
  .header-sub{font-size:0.88rem;color:var(--texto-suave);margin-top:4px;}
  .header-meta{background:var(--naranja-claro);border-top:1px solid #fde68a;padding:0.55rem 1.5rem;}
  .header-meta-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;font-size:0.83rem;color:#92400e;font-weight:500;}
  .barra-wrap{position:sticky;top:0;z-index:100;background:var(--blanco);border-bottom:1px solid var(--borde);padding:0.6rem 1.5rem;box-shadow:0 1px 6px rgba(0,0,0,0.05);}
  .barra-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:1rem;}
  .barra-track{flex:1;height:6px;background:#f3f4f6;border-radius:99px;overflow:hidden;}
  .barra-fill{height:100%;background:var(--naranja);border-radius:99px;transition:width 0.35s ease;width:0%;}
  .barra-num{font-size:13px;font-weight:600;color:var(--azul-oscuro);white-space:nowrap;min-width:52px;}
  .barra-score{font-size:13px;color:var(--texto-suave);white-space:nowrap;}
  .barra-score .ok{color:var(--verde);font-weight:600;}
  .barra-score .ko{color:var(--rojo);font-weight:600;}
  main{max-width:860px;margin:0 auto;padding:2rem 1.5rem 5rem;}
  .card{background:var(--blanco);border:1px solid var(--borde);border-radius:10px;padding:1.5rem 1.6rem;margin-bottom:1.4rem;transition:box-shadow 0.2s;}
  .card:hover{box-shadow:0 3px 14px rgba(0,0,0,0.06);}
  .card-num{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--naranja);margin-bottom:0.5rem;}
  .card-pregunta{font-family:'Lora',serif;font-size:1rem;font-weight:600;line-height:1.55;color:var(--azul-oscuro);margin-bottom:1.1rem;}
  .opciones{display:flex;flex-direction:column;gap:0.45rem;}
  .opcion{display:flex;align-items:flex-start;gap:0.7rem;padding:0.7rem 1rem;border:1.5px solid var(--borde);border-radius:7px;cursor:pointer;background:var(--blanco);text-align:left;font-family:'Source Sans 3',sans-serif;font-size:0.93rem;color:var(--texto);line-height:1.5;transition:border-color 0.15s,background 0.15s;width:100%;}
  .opcion:hover:not(:disabled){border-color:var(--naranja-borde);background:var(--naranja-claro);}
  .opcion .letra{font-weight:700;color:var(--naranja);min-width:18px;font-size:0.85rem;margin-top:2px;flex-shrink:0;}
  .opcion.correcta{border-color:var(--verde-borde);background:var(--verde-bg);color:var(--verde);}
  .opcion.correcta .letra{color:#15803d;}
  .opcion.incorrecta{border-color:var(--rojo-borde);background:var(--rojo-bg);color:var(--rojo);}
  .opcion.incorrecta .letra{color:var(--rojo);}
  .opcion:disabled{cursor:default;}
  .explicacion{display:none;margin-top:1rem;padding:0.9rem 1rem 0.9rem 1.1rem;background:#fffbeb;border-left:3px solid var(--naranja);border-radius:0 6px 6px 0;font-size:0.875rem;line-height:1.65;color:var(--texto);}
  .explicacion.visible{display:block;animation:fadeIn 0.22s ease;}
  .explicacion strong{color:var(--azul-oscuro);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
  .resultado{display:none;background:var(--blanco);border:1px solid var(--borde);border-radius:12px;padding:2.5rem 2rem 2rem;margin:1.5rem 0 2rem;text-align:center;}
  .resultado.visible{display:block;animation:fadeIn 0.3s ease;}
  .resultado-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--naranja);font-weight:600;margin-bottom:0.5rem;}
  .resultado h2{font-family:'Lora',serif;font-size:1.75rem;font-weight:700;color:var(--azul-oscuro);margin-bottom:0.3rem;}
  .resultado-nota{font-size:3.2rem;font-weight:700;color:var(--azul-oscuro);line-height:1;margin:1rem 0 0.3rem;font-family:'Lora',serif;}
  .resultado-nota span{color:var(--naranja);}
  .calif-badge{display:inline-block;padding:5px 16px;border-radius:99px;font-size:0.9rem;font-weight:600;margin:0.6rem 0 1.5rem;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:0 0 1.5rem;}
  .stat{background:var(--fondo);border:1px solid var(--borde);border-radius:8px;padding:0.9rem 0.5rem;}
  .stat-num{font-size:1.9rem;font-weight:700;font-family:'Lora',serif;}
  .stat-lab{font-size:0.78rem;color:var(--texto-suave);margin-top:2px;}
  .resultado-hint{font-size:0.85rem;color:var(--texto-suave);margin-bottom:1.2rem;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:0.7rem 1.6rem;border-radius:7px;font-family:'Source Sans 3',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;}
  .btn-naranja{background:var(--naranja);color:white;}
  .btn-naranja:hover{background:#b45309;transform:translateY(-1px);}
  .divider{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--texto-suave);margin:2rem 0 1.5rem;display:flex;align-items:center;gap:1rem;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--borde);}
  @media(max-width:580px){main{padding:1.2rem 1rem 4rem;}.card{padding:1.1rem;}.stats{grid-template-columns:1fr 1fr;}.header-top{padding:1rem;gap:0.8rem;}.header-meta{padding:0.5rem 1rem;}}

<script>
const BANCO = [
  // ── CAP. I PRINCIPIOS GENERALES ──
  {p:"El artículo 137 CE establece la organización territorial del Estado. ¿Cuáles son las tres entidades territoriales que menciona y qué autonomía se les reconoce?",ops:["Municipios, comarcas y Comunidades Autónomas; autonomía plena para todos sus actos","Municipios, provincias y Comunidades Autónomas; todas gozan de autonomía para la gestión de sus respectivos intereses","Estado, Comunidades Autónomas y provincias; autonomía financiera y legislativa","Municipios, mancomunidades y Comunidades Autónomas; autonomía administrativa únicamente"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 137 CE establece que «el Estado se organiza territorialmente en municipios, en provincias y en las Comunidades Autónomas que se constituyan» y que «todas estas entidades gozan de autonomía para la gestión de sus respectivos intereses». La autonomía no es igual en todas: es de distinta naturaleza e intensidad según la entidad."},
  {p:"El artículo 138.2 CE establece un límite a las diferencias entre Estatutos de Autonomía. ¿Cuál es?",ops:["Las diferencias no podrán implicar, en ningún caso, privilegios económicos o sociales","Los Estatutos deberán garantizar un mínimo de competencias idéntico para todas las CCAA","Las diferencias competenciales solo serán válidas si se justifican por razones históricas o culturales","Ninguna CCAA podrá asumir competencias que impliquen un trato fiscal diferente al del Estado"],c:0,exp:"<strong>Respuesta correcta: A.</strong> El art. 138.2 CE establece que «las diferencias entre los Estatutos de las distintas Comunidades Autónomas no podrán implicar, en ningún caso, privilegios económicos o sociales». Este límite garantiza la igualdad material entre los ciudadanos con independencia de la CCAA en la que residan."},
  {p:"El artículo 139.1 CE consagra la igualdad de todos los españoles en cualquier parte del territorio. ¿Qué prohíbe expresamente el artículo 139.2 CE?",ops:["Que las CCAA establezcan aranceles internos o barreras al comercio entre territorios","Que ninguna autoridad adopte medidas que directa o indirectamente obstaculicen la libre circulación y establecimiento de personas y la libre circulación de bienes en todo el territorio","Que el Estado imponga medidas que limiten la autonomía financiera de las CCAA","Que los municipios establezcan restricciones al acceso de ciudadanos de otros municipios"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 139.2 CE establece que «ninguna autoridad podrá adoptar medidas que directa o indirectamente obstaculicen la libertad de circulación y establecimiento de las personas y la libre circulación de bienes en todo el territorio español». Es una cláusula de unidad del mercado interior."},
  // ── CAP. II ADMINISTRACIÓN LOCAL ──
  {p:"El artículo 140 CE garantiza la autonomía municipal. ¿Cómo se eligen los Concejales y cómo se elige al Alcalde?",ops:["Concejales: por sufragio universal, igual, libre, directo y secreto. Alcaldes: por los Concejales o por los vecinos","Concejales: designados por los partidos con representación provincial. Alcaldes: elegidos directamente por los vecinos","Concejales: por sufragio universal e indirecto. Alcaldes: siempre elegidos por los Concejales","Concejales y Alcaldes: todos elegidos directamente por los vecinos mediante sufragio universal"],c:0,exp:"<strong>Respuesta correcta: A.</strong> El art. 140 CE establece que los Concejales serán elegidos «por los vecinos del municipio mediante sufragio universal, igual, libre, directo y secreto». Los Alcaldes, en cambio, «serán elegidos por los Concejales o por los vecinos», admitiendo la CE ambas modalidades."},
  {p:"El artículo 141.1 CE define la provincia y establece qué se necesita para alterar sus límites. ¿Qué instrumento normativo exige?",ops:["Decreto del Consejo de Ministros con informe del Consejo de Estado","Ley orgánica aprobada por las Cortes Generales","Ley ordinaria del Estado con dictamen favorable del Consejo de Estado","Acuerdo de las CCAA afectadas ratificado por las Cortes Generales"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 141.1 CE establece que «cualquier alteración de los límites provinciales habrá de ser aprobada por las Cortes Generales mediante ley orgánica». La reserva de ley orgánica garantiza la estabilidad del mapa provincial y exige amplio consenso parlamentario."},
  {p:"El artículo 141.2 CE establece quién gobierna y administra las provincias. ¿A quién encomienda esa tarea?",ops:["A los Delegados del Gobierno nombrados por el Consejo de Ministros","A Diputaciones u otras Corporaciones de carácter representativo","A los Alcaldes de los municipios más poblados de cada provincia","A los Gobernadores civiles bajo supervisión del Ministerio del Interior"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 141.2 CE establece que «el gobierno y la administración autónoma de las provincias estarán encomendados a Diputaciones u otras Corporaciones de carácter representativo». La mención de «otras Corporaciones» permite la existencia de entidades equivalentes en territorios forales."},
  {p:"En los archipiélagos, el artículo 141.4 CE reconoce una administración propia para las islas. ¿En qué forma se organiza?",ops:["En forma de Ayuntamientos insulares con competencias ampliadas","En forma de Cabildos o Consejos","En forma de Mancomunidades de municipios insulares","En forma de Diputaciones Provinciales insulares"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 141.4 CE establece que «en los archipiélagos, las islas tendrán además su administración propia en forma de Cabildos o Consejos». Los Cabildos son propios de Canarias y los Consejos Insulares de Baleares."},
  {p:"El artículo 142 CE regula las Haciendas locales. ¿De qué fuentes se nutrirán fundamentalmente?",ops:["De transferencias del Estado y de las Comunidades Autónomas exclusivamente","De tributos propios y de participación en los del Estado y de las Comunidades Autónomas","De recargos sobre tributos estatales y del Fondo de Compensación Interterritorial","De subvenciones europeas y de ingresos procedentes de la prestación de servicios"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 142 CE establece que las Haciendas locales «se nutrirán fundamentalmente de tributos propios y de participación en los del Estado y de las Comunidades Autónomas». El principio de suficiencia financiera exige que dispongan de medios suficientes para las funciones que la ley les atribuye."},
  // ── CAP. III COMUNIDADES AUTÓNOMAS ──
  {p:"El artículo 143.1 CE establece quiénes pueden acceder al autogobierno para constituirse en Comunidad Autónoma. ¿Cuáles son los tres supuestos?",ops:["Solo las regiones históricas con lengua propia y las comunidades insulares","Provincias limítrofes con características históricas, culturales y económicas comunes; territorios insulares; y provincias con entidad regional histórica","Cualquier provincia que lo solicite mediante referéndum con mayoría absoluta de sus electores","Solo las CCAA previstas en las Disposiciones Transitorias de la Constitución"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 143.1 CE establece tres supuestos: provincias limítrofes con características históricas, culturales y económicas comunes; territorios insulares; y provincias con entidad regional histórica. Estos tres son los únicos que la CE reconoce como habilitados para acceder al autogobierno por la vía ordinaria."},
  {p:"La iniciativa autonómica del artículo 143.2 CE exige cumplir unos requisitos en un plazo determinado. ¿Cuál es ese plazo?",ops:["Tres meses desde el primer acuerdo de alguna Corporación local interesada","Seis meses desde el primer acuerdo adoptado al respecto por alguna de las Corporaciones locales interesadas","Un año desde la aprobación de la Constitución","Cuatro meses desde la publicación del acuerdo en el BOE"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 143.2 CE exige que los requisitos de iniciativa (acuerdo de todas las Diputaciones y de dos terceras partes de los municipios que representen la mayoría del censo electoral de cada provincia o isla) «deberán ser cumplidos en el plazo de seis meses desde el primer acuerdo adoptado al respecto por alguna de las Corporaciones locales interesadas»."},
  {p:"Si la iniciativa autonómica del artículo 143 CE no prospera, ¿cuándo puede reiterarse según el artículo 143.3 CE?",ops:["Al año siguiente, si se obtiene el apoyo de la mayoría del censo electoral","Pasados tres años desde el intento fallido","Solamente podrá reiterarse pasados cinco años","No podrá reiterarse en ningún caso durante la misma legislatura"],c:2,exp:"<strong>Respuesta correcta: C.</strong> El art. 143.3 CE establece que «la iniciativa, en caso de no prosperar, solamente podrá reiterarse pasados cinco años». Esta limitación temporal evita la reiteración inmediata de procesos autonómicos fallidos."},
  {p:"El artículo 144 CE permite a las Cortes Generales actuar por motivos de interés nacional en el proceso autonómico. ¿Mediante qué tipo de norma y en qué supuestos?",ops:["Mediante ley ordinaria, para autorizar CCAA uniprovinciales y sustituir la iniciativa local","Mediante ley orgánica: autorizar CCAA cuyo ámbito no supere una provincia sin reunir las condiciones del art. 143.1; autorizar Estatutos para territorios no integrados en la organización provincial; y sustituir la iniciativa de las Corporaciones locales del art. 143.2","Mediante decreto-ley, en casos de urgencia, para crear o disolver CCAA","Mediante ley de bases, para establecer el marco mínimo de autonomía de las CCAA de nueva creación"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 144 CE habilita a las Cortes Generales, «mediante ley orgánica» y por motivos de interés nacional, para tres supuestos: autorizar CCAA uniprovinciales que no reúnan las condiciones del art. 143.1 (a); autorizar Estatutos para territorios no integrados en la organización provincial, como Ceuta y Melilla (b); y sustituir la iniciativa de las Corporaciones locales (c)."},
  {p:"El artículo 145.1 CE establece una prohibición absoluta respecto a las Comunidades Autónomas. ¿Cuál es?",ops:["No podrán celebrar tratados internacionales con otros Estados","En ningún caso se admitirá la federación de Comunidades Autónomas","No podrán asumir competencias que correspondan en exclusiva al Estado","No podrán imponer tributos a ciudadanos de otras Comunidades Autónomas"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 145.1 CE establece de forma rotunda que «en ningún caso se admitirá la federación de Comunidades Autónomas». Esta prohibición expresa diferencia el modelo autonómico español del federalismo: las CCAA no pueden integrarse en entidades federadas de rango superior."},
  {p:"El artículo 145.2 CE distingue entre convenios y acuerdos de cooperación entre CCAA. ¿Qué diferencia existe respecto a la intervención de las Cortes Generales?",ops:["Ambos requieren siempre autorización previa de las Cortes Generales","Los convenios para gestión de servicios propios solo requieren comunicación a las Cortes; los acuerdos de cooperación necesitan autorización de las Cortes Generales","Los convenios requieren autorización y los acuerdos solo comunicación posterior","Ni los convenios ni los acuerdos requieren intervención de las Cortes si están previstos en los Estatutos"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 145.2 CE establece que los convenios entre CCAA para gestión de servicios propios previstos en los Estatutos solo requieren comunicación a las Cortes (que pueden oponerse). Los acuerdos de cooperación entre CCAA en los demás supuestos «necesitarán la autorización de las Cortes Generales»."},
  {p:"El artículo 147.1 CE define la naturaleza jurídica de los Estatutos de Autonomía. ¿Cómo los define?",ops:["Como leyes orgánicas del Estado con rango superior a las leyes ordinarias autonómicas","Como la norma institucional básica de cada Comunidad Autónoma, reconocida y amparada por el Estado como parte integrante de su ordenamiento jurídico","Como tratados de autogobierno entre el Estado y cada Comunidad Autónoma con valor cuasiconstitucional","Como reglamentos orgánicos de las instituciones autonómicas aprobados por sus Asambleas legislativas"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 147.1 CE define los Estatutos como «la norma institucional básica de cada Comunidad Autónoma» y establece que «el Estado los reconocerá y amparará como parte integrante de su ordenamiento jurídico». Son normas de doble naturaleza: autonómica (norma básica de la CCAA) y estatal (ley orgánica del Estado)."},
  {p:"El artículo 147.2 CE establece el contenido mínimo obligatorio de los Estatutos de Autonomía. ¿Cuáles son los cuatro elementos que deben contener?",ops:["Nombre, territorio, instituciones y régimen lingüístico","Denominación de la Comunidad, delimitación de su territorio, denominación y organización de sus instituciones propias, y competencias asumidas con las bases para el traspaso de servicios","Mapa competencial, régimen financiero, organización judicial y normas de reforma estatutaria","Sistema electoral, organización del ejecutivo, carta de derechos autonómicos y régimen local"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 147.2 CE exige que los Estatutos contengan: a) la denominación de la Comunidad; b) la delimitación de su territorio; c) la denominación, organización y sede de las instituciones autónomas propias; d) las competencias asumidas dentro del marco constitucional y las bases para el traspaso de servicios."},
  {p:"¿Qué instrumento normativo exige el artículo 147.3 CE para la reforma de los Estatutos de Autonomía?",ops:["Una ley ordinaria de las Cortes Generales con mayoría simple","La aprobación por las Cortes Generales mediante ley orgánica, además del procedimiento establecido en el propio Estatuto","Un referéndum autonómico con mayoría absoluta de los electores censados","Un acuerdo de las instituciones autonómicas ratificado por el Senado por mayoría de dos tercios"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 147.3 CE establece que la reforma de los Estatutos «se ajustará al procedimiento establecido en los mismos y requerirá, en todo caso, la aprobación por las Cortes Generales, mediante ley orgánica». Son necesarios, pues, dos requisitos acumulativos: seguir el procedimiento estatutario propio y la aprobación estatal mediante ley orgánica."},
  {p:"El artículo 148.1 CE enumera materias que las CCAA podrán asumir. ¿Cuál de las siguientes NO figura en esa lista?",ops:["Ordenación del territorio, urbanismo y vivienda","Agricultura y ganadería, de acuerdo con la ordenación general de la economía","Relaciones internacionales y comercio exterior","Asistencia social"],c:2,exp:"<strong>Respuesta correcta: C.</strong> Las relaciones internacionales y el comercio exterior son competencia exclusiva del Estado según el art. 149.1.3.ª y 10.ª CE. El art. 148 no las menciona porque las CCAA no pueden asumir estas materias. Las demás opciones (ordenación del territorio, agricultura y asistencia social) sí figuran en el art. 148.1 CE."},
  {p:"Según el artículo 148.2 CE, ¿cuándo y cómo pueden las CCAA ampliar las competencias asumidas inicialmente?",ops:["En cualquier momento, mediante simple acuerdo de su Asamblea legislativa","Transcurridos cinco años, mediante la reforma de sus Estatutos, dentro del marco del artículo 149 CE","Desde el primer día, si así lo establece el Estatuto de Autonomía inicial","A partir del tercer año, si el Estado lo autoriza mediante ley orgánica"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 148.2 CE establece que «transcurridos cinco años, y mediante la reforma de sus Estatutos, las Comunidades Autónomas podrán ampliar sucesivamente sus competencias dentro del marco establecido en el artículo 149». El plazo de cinco años solo afectaba a las CCAA que accedieron por la vía ordinaria del art. 143 CE."},
  {p:"El artículo 149.1 CE establece las competencias exclusivas del Estado. ¿Cuál de las siguientes es competencia exclusiva estatal según ese precepto?",ops:["La sanidad e higiene","La ordenación del turismo","La legislación mercantil, penal y penitenciaria","El patrimonio monumental de interés autonómico"],c:2,exp:"<strong>Respuesta correcta: C.</strong> La legislación mercantil, penal y penitenciaria figura expresamente en el art. 149.1.6.ª CE como competencia exclusiva del Estado. La sanidad e higiene es del art. 148 (autonómica); el turismo también (art. 148.1.18.ª); y el patrimonio monumental de interés autonómico es competencia de las CCAA (art. 148.1.16.ª)."},
  {p:"El artículo 149.1.18.ª CE atribuye al Estado competencia exclusiva sobre las bases del régimen jurídico de las Administraciones públicas. ¿Qué garantía mínima establece expresamente?",ops:["Que todas las Administraciones adopten el mismo organigrama jerárquico","Que en todo caso se garantice a los administrados un tratamiento común ante ellas","Que todas las Administraciones apliquen un único procedimiento administrativo sin especialidades autonómicas","Que el régimen disciplinario de los funcionarios sea idéntico en todas las Administraciones"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 149.1.18.ª CE atribuye al Estado la competencia sobre «las bases del régimen jurídico de las Administraciones públicas y del régimen estatutario de sus funcionarios que, en todo caso, garantizarán a los administrados un tratamiento común ante ellas». Esta garantía de tratamiento común es el límite mínimo infranqueable para las especialidades autonómicas."},
  {p:"El artículo 149.3 CE regula las materias no atribuidas expresamente al Estado. ¿Qué sistema establece?",ops:["Corresponden automáticamente a las CCAA sin posibilidad de reserva estatal","Podrán corresponder a las CCAA en virtud de sus Estatutos; las no asumidas corresponden al Estado, cuyas normas prevalecerán sobre las autonómicas en caso de conflicto; el derecho estatal es supletorio del autonómico","Corresponden al Estado en todo caso, salvo que la CE expresamente las atribuya a las CCAA","Son de competencia compartida obligatoria entre el Estado y todas las CCAA"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 149.3 CE establece la cláusula residual: las materias no atribuidas al Estado podrán asumir las CCAA vía Estatuto; las no asumidas corresponden al Estado; en caso de conflicto prevalece el derecho estatal sobre el autonómico en lo no atribuido a competencia exclusiva autonómica; y «el derecho estatal será, en todo caso, supletorio del derecho de las Comunidades Autónomas»."},
  {p:"El artículo 150.1 CE regula las leyes marco. ¿Qué permiten hacer al Estado?",ops:["Transferir competencias exclusivas del Estado a las CCAA de forma permanente e irrevocable","Atribuir a todas o alguna CCAA la facultad de dictar normas legislativas en el marco de principios, bases y directrices fijados por una ley estatal, en materias de competencia estatal","Delegar en las CCAA el ejercicio de funciones ejecutivas sin necesidad de ley orgánica","Armonizar las normas autonómicas cuando el interés general así lo exija"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 150.1 CE permite a las Cortes Generales, mediante leyes marco, atribuir a todas o alguna CCAA «la facultad de dictar, para sí mismas, normas legislativas en el marco de los principios, bases y directrices fijados por una ley estatal». El Estado mantiene el control reservándose la fijación del marco y la supervisión."},
  {p:"El artículo 150.2 CE regula las leyes orgánicas de transferencia o delegación. ¿Qué exige la Constitución que prevea esa ley?",ops:["La mayoría necesaria en la Asamblea autonómica para ejercer las competencias transferidas","La correspondiente transferencia de medios financieros y las formas de control que se reserve el Estado","El plazo máximo de cinco años para la devolución de las competencias al Estado","La creación de un organismo mixto Estado-CCAA para supervisar el ejercicio de las competencias delegadas"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 150.2 CE establece que mediante ley orgánica el Estado podrá transferir o delegar competencias propias a las CCAA y que «la ley preverá en cada caso la correspondiente transferencia de medios financieros, así como las formas de control que se reserve el Estado». Sin financiación la transferencia sería ilusoria."},
  {p:"El artículo 150.3 CE regula las leyes de armonización. ¿Qué mayoría se requiere para que las Cortes aprecien la necesidad de armonizar?",ops:["Mayoría simple de cada Cámara","Mayoría absoluta de cada Cámara","Mayoría de dos tercios de cada Cámara","Mayoría de tres quintos del Congreso y mayoría absoluta del Senado"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 150.3 CE establece que las leyes de armonización pueden dictarse incluso en materias atribuidas a la competencia de las CCAA «cuando así lo exija el interés general» y que «corresponde a las Cortes Generales, por mayoría absoluta de cada Cámara, la apreciación de esta necesidad». La mayoría absoluta en ambas Cámaras es el requisito previo."},
  {p:"El artículo 151.1 CE regula la vía rápida de acceso a la autonomía. ¿Qué requisito añade al del art. 143.2 CE para los municipios?",ops:["Las dos terceras partes de los municipios con mayoría del censo electoral de la provincia","Las tres cuartas partes de los municipios de cada provincia afectada que representen al menos la mayoría del censo electoral de cada una de ellas","La mayoría absoluta de todos los municipios con independencia de su población","El cien por cien de los municipios de la provincia o territorio afectado"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 151.1 CE exige, además de las Diputaciones, que «las tres cuartas partes de los municipios de cada una de las provincias afectadas que representen, al menos, la mayoría del censo electoral de cada una de ellas» apoyen la iniciativa. Es un umbral más exigente que el del art. 143.2 (dos terceras partes)."},
  {p:"En la vía del artículo 151.1 CE, la iniciativa autonómica debe ser ratificada mediante referéndum. ¿Qué resultado se exige?",ops:["Mayoría simple de los votos válidamente emitidos en el conjunto del territorio","Voto afirmativo de la mayoría absoluta de los electores de cada provincia","Mayoría de dos tercios de los votos válidos en cada provincia","Mayoría relativa en al menos la mitad de las provincias implicadas"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 151.1 CE exige que la iniciativa autonómica «sea ratificada mediante referéndum por el voto afirmativo de la mayoría absoluta de los electores de cada provincia». Esta es una de las mayorías más exigentes de toda la Constitución: mayoría absoluta del censo (no solo de los votantes) en cada provincia."},
  {p:"En el procedimiento del artículo 151.2 CE para elaborar el Estatuto, la Comisión Constitucional del Congreso dispone de un plazo para examinar el proyecto. ¿Cuánto tiempo tiene?",ops:["Un mes desde la recepción del proyecto","Dos meses desde la recepción del proyecto","Tres meses desde la recepción del proyecto","Seis meses desde la remisión por la Asamblea de Parlamentarios"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 151.2.2.º CE establece que la Comisión Constitucional del Congreso, una vez recibido el proyecto de Estatuto aprobado por la Asamblea de Parlamentarios, «dentro del plazo de dos meses, lo examinará con el concurso y asistencia de una delegación de la Asamblea proponente para determinar de común acuerdo su formulación definitiva»."},
  {p:"El artículo 152.1 CE define la organización institucional básica de las CCAA que accedieron por la vía del art. 151 CE. ¿Quién elige al Presidente de la Comunidad y quién lo nombra?",ops:["Lo eligen directamente los ciudadanos mediante sufragio universal y lo nombra el Rey","Lo elige la Asamblea Legislativa de entre sus miembros y lo nombra el Rey","Lo designa el Consejo de Gobierno y lo ratifica la Asamblea Legislativa","Lo propone el partido más votado y lo confirma el Tribunal Superior de Justicia autonómico"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 152.1 CE establece que el Presidente autonómico es «elegido por la Asamblea, de entre sus miembros, y nombrado por el Rey». Es similar al modelo de investidura parlamentaria estatal: el Parlamento autonómico elige y el Rey formaliza el nombramiento."},
  {p:"Según el artículo 152.1 CE, ¿qué órgano judicial culmina la organización judicial en el ámbito territorial de la Comunidad Autónoma?",ops:["La Audiencia Provincial de la capital de la CCAA","Un Tribunal Superior de Justicia, sin perjuicio de la jurisdicción que corresponde al Tribunal Supremo","El Juzgado Central de lo Contencioso-Administrativo de la CCAA","Una Sala especial del Tribunal Supremo con sede en la capital autonómica"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 152.1 CE establece que «un Tribunal Superior de Justicia, sin perjuicio de la jurisdicción que corresponde al Tribunal Supremo, culminará la organización judicial en el ámbito territorial de la Comunidad Autónoma». El TSJ no excluye la casación ante el TS: solo «culmina» la organización judicial autonómica."},
  {p:"El artículo 152.2 CE establece que una vez sancionados y promulgados los Estatutos por la vía del art. 151 CE, solo podrán ser modificados de una forma específica. ¿Cuál?",ops:["Mediante ley orgánica de las Cortes Generales sin necesidad de referéndum","Mediante los procedimientos establecidos en ellos mismos y con referéndum entre los electores inscritos en los censos correspondientes","Mediante acuerdo del Gobierno estatal y del Consejo de Gobierno autonómico","Solo mediante reforma constitucional, por estar equiparados en rango a la Constitución"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 152.2 CE establece que estos Estatutos «solamente podrán ser modificados mediante los procedimientos en ellos establecidos y con referéndum entre los electores inscritos en los censos correspondientes». El referéndum ratificatorio es obligatorio, a diferencia de los Estatutos del art. 143 CE."},
  {p:"El artículo 153 CE enumera los órganos que controlan la actividad autonómica. ¿Qué órgano controla la administración autónoma y sus normas reglamentarias?",ops:["El Tribunal Constitucional","El Tribunal de Cuentas","La jurisdicción contencioso-administrativa","El Delegado del Gobierno en la Comunidad Autónoma"],c:2,exp:"<strong>Respuesta correcta: C.</strong> El art. 153 CE distribuye el control autonómico entre cuatro instancias: TC para la constitucionalidad de normas con fuerza de ley (a); Gobierno para el ejercicio de funciones delegadas (b); jurisdicción contencioso-administrativa para la administración autónoma y sus reglamentos (c); y Tribunal de Cuentas para el control económico y presupuestario (d)."},
  {p:"El artículo 153.d) CE atribuye el control económico y presupuestario de las CCAA a un órgano específico. ¿Cuál es?",ops:["La Intervención General del Estado","El Tribunal de Cuentas","El Ministerio de Hacienda a través de la IGAE","La Cámara de Cuentas de cada Comunidad Autónoma"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 153.d) CE atribuye al Tribunal de Cuentas el control económico y presupuestario de las CCAA. El Tribunal de Cuentas es el supremo órgano fiscalizador de las cuentas y de la gestión económica del Estado y del sector público, incluyendo a las CCAA."},
  {p:"El artículo 154 CE regula la figura del Delegado del Gobierno en la Comunidad Autónoma. ¿Cuáles son sus funciones?",ops:["Presidir la Administración autonómica y supervisar el cumplimiento del Estatuto","Dirigir la Administración del Estado en el territorio de la CCAA y coordinarla, cuando proceda, con la administración propia de la Comunidad","Representar al Estado en los actos protocolarios de la CCAA y supervisar el Delegado Provincial","Controlar la legalidad de los actos autonómicos y elevar recursos al Tribunal Constitucional"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 154 CE establece que el Delegado del Gobierno «dirigirá la Administración del Estado en el territorio de la Comunidad Autónoma y la coordinará, cuando proceda, con la administración propia de la Comunidad». Es nombrado por el Gobierno y su función es doble: dirección de la Administración periférica estatal y coordinación con la autonómica."},
  {p:"El artículo 155 CE regula la coerción estatal sobre las CCAA. ¿Qué requisitos previos exige antes de adoptar las medidas de coerción?",ops:["Solo requiere la aprobación del Tribunal Constitucional y acuerdo del Consejo de Ministros","Requerimiento previo al Presidente de la CCAA y, si no es atendido, aprobación por mayoría absoluta del Senado","Comunicación a las Cortes Generales y plazo de diez días para que la CCAA subsane el incumplimiento","Propuesta del Delegado del Gobierno y ratificación del Congreso por mayoría de tres quintos"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 155.1 CE establece un procedimiento en dos fases: primero, el Gobierno debe requerir al Presidente de la CCAA; si el requerimiento no es atendido, entonces podrá actuar «con la aprobación por mayoría absoluta del Senado». La intervención del Senado como Cámara de representación territorial es esencial."},
  {p:"¿Cuáles son las dos causas que habilitan al Estado a aplicar el artículo 155 CE?",ops:["Déficit presupuestario excesivo o negativa a colaborar con la Administración estatal","Incumplimiento de las obligaciones constitucionales o legales, o actuación que atente gravemente al interés general de España","Vulneración del bloque de constitucionalidad o crisis institucional grave en la CCAA","Interferencia competencial grave o negativa reiterada a ejecutar legislación básica del Estado"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 155.1 CE prevé dos causas: (1) que la CCAA «no cumpliere las obligaciones que la Constitución u otras leyes le impongan» y (2) que «actuare de forma que atente gravemente al interés general de España». Ambas son causas amplias cuya apreciación corresponde al Gobierno con control parlamentario del Senado."},
  {p:"El artículo 156.1 CE reconoce la autonomía financiera de las CCAA. ¿Con arreglo a qué principios?",ops:["Principios de eficiencia, equidad y solidaridad interterritorial","Principios de coordinación con la Hacienda estatal y de solidaridad entre todos los españoles","Principios de suficiencia financiera, autonomía tributaria y corresponsabilidad fiscal","Principios de proporcionalidad, transparencia y control parlamentario"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 156.1 CE establece que las CCAA «gozarán de autonomía financiera para el desarrollo y ejecución de sus competencias con arreglo a los principios de coordinación con la Hacienda estatal y de solidaridad entre todos los españoles». La autonomía financiera no es absoluta: está limitada por la coordinación y la solidaridad."},
  {p:"El artículo 157.1 CE enumera los recursos de las Comunidades Autónomas. ¿Cuál de las siguientes NO es un recurso previsto en ese artículo?",ops:["Impuestos cedidos total o parcialmente por el Estado","Transferencias del Fondo de Compensación Interterritorial","Subvenciones directas de la Unión Europea gestionadas por las CCAA","El producto de las operaciones de crédito"],c:2,exp:"<strong>Respuesta correcta: C.</strong> El art. 157.1 CE enumera cinco tipos de recursos autonómicos: impuestos cedidos y recargos (a); impuestos, tasas y contribuciones especiales propios (b); transferencias del Fondo de Compensación Interterritorial y asignaciones presupuestarias (c); rendimientos patrimoniales e ingresos de derecho privado (d); y operaciones de crédito (e). Las subvenciones directas de la UE no figuran en este artículo constitucional."},
  {p:"El artículo 157.2 CE establece una prohibición tributaria expresa para las CCAA. ¿Cuál es?",ops:["No podrán establecer impuestos sobre materias reservadas al Estado por el art. 149.1 CE","No podrán en ningún caso adoptar medidas tributarias sobre bienes situados fuera de su territorio o que supongan obstáculo para la libre circulación de mercancías o servicios","No podrán establecer recargos sobre el IRPF superiores al límite fijado por ley orgánica","No podrán crear tributos sobre actividades que ya tribute al Estado o a otro ente local"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 157.2 CE establece que «las Comunidades Autónomas no podrán en ningún caso adoptar medidas tributarias sobre bienes situados fuera de su territorio o que supongan obstáculo para la libre circulación de mercancías o servicios». Es una prohibición de extraterritorialidad y de barreras fiscales internas."},
  {p:"El artículo 158.2 CE crea el Fondo de Compensación Interterritorial. ¿Cuál es su finalidad y quién distribuye sus recursos?",ops:["Garantizar el mínimo de servicios públicos; lo distribuye el Gobierno por decreto","Corregir desequilibrios económicos interterritoriales y hacer efectivo el principio de solidaridad; sus recursos para gastos de inversión los distribuyen las Cortes Generales entre CCAA y provincias","Financiar las competencias delegadas por el Estado; lo gestiona el Ministerio de Hacienda","Compensar el coste de las competencias asumidas; lo administran conjuntamente las CCAA beneficiarias"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 158.2 CE establece que el Fondo de Compensación se crea «con el fin de corregir desequilibrios económicos interterritoriales y hacer efectivo el principio de solidaridad». Sus recursos se destinan a «gastos de inversión» y «serán distribuidos por las Cortes Generales entre las Comunidades Autónomas y provincias, en su caso». La distribución parlamentaria garantiza el control democrático."},
  // ── PREGUNTAS DE SÍNTESIS Y CONTRASTE ──
  {p:"¿Cuál es la diferencia esencial entre la vía de acceso a la autonomía del artículo 143 CE y la del artículo 151 CE?",ops:["No hay diferencia: ambas vías llevan al mismo nivel competencial en el mismo plazo","La vía del art. 143 es la ordinaria (umbrales municipales menores, plazo de cinco años para ampliar competencias, sin referéndum ratificatorio); la del art. 151 es la rápida (umbrales mayores, referéndum de ratificación, acceso inmediato al techo competencial del art. 149)","La vía del art. 143 requiere referéndum y la del art. 151 no; en lo demás son idénticas","La vía del art. 151 solo puede usarse por territorios con lengua propia; la del art. 143 es universal"],c:1,exp:"<strong>Respuesta correcta: B.</strong> La vía ordinaria del art. 143 exige dos terceras partes de municipios con mayoría del censo, sin referéndum ratificatorio y con el límite de no poder acceder al techo competencial del art. 149 hasta pasados cinco años. La vía rápida del art. 151 exige tres cuartas partes de municipios, referéndum con mayoría absoluta del censo en cada provincia, pero permite el acceso inmediato al máximo nivel competencial."},
  {p:"El artículo 149.1.7.ª CE atribuye al Estado la legislación laboral. ¿Qué matiza expresamente sobre su ejecución?",ops:["La ejecución también corresponde al Estado de forma exclusiva","Sin perjuicio de su ejecución por los órganos de las Comunidades Autónomas","Su ejecución corresponde al Estado salvo en materias de seguridad e higiene en el trabajo","La ejecución es compartida entre el Estado y las CCAA en función del tamaño de las empresas afectadas"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 149.1.7.ª CE atribuye al Estado la «legislación laboral; sin perjuicio de su ejecución por los órganos de las Comunidades Autónomas». Este es un ejemplo claro de la técnica constitucional de separar la competencia normativa (estatal) de la ejecutiva (autonómica)."},
  {p:"El artículo 149.1.32.ª CE reserva al Estado la autorización para la convocatoria de consultas populares por referéndum. ¿Qué implica esto para las CCAA?",ops:["Las CCAA pueden convocar referéndums propios sin autorización estatal si su Estatuto lo prevé","Las CCAA no pueden convocar referéndums sin previa autorización estatal, que es competencia exclusiva del Estado","Las CCAA pueden convocar consultas no vinculantes sin necesitar autorización del Estado","Solo el Estado central puede convocar referéndums; las CCAA tienen prohibida cualquier consulta popular"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 149.1.32.ª CE reserva al Estado la «autorización para la convocatoria de consultas populares por vía de referéndum». El TC ha interpretado que esto incluye todo tipo de referéndum, aunque sea de ámbito autonómico, de modo que las CCAA necesitan autorización estatal. Esta competencia es clave en el debate sobre las consultas de autodeterminación."},
  {p:"¿Qué dice el artículo 138.1 CE sobre la solidaridad territorial y las circunstancias insulares?",ops:["El Estado podrá establecer diferencias en el gasto público para compensar las desventajas de las comunidades menos desarrolladas","El Estado garantiza la realización efectiva del principio de solidaridad, velando por un equilibrio económico adecuado y justo entre las diversas partes del territorio, atendiendo en particular a las circunstancias del hecho insular","La solidaridad es un principio orientador pero no obliga a ninguna actuación concreta del Estado","El Estado igualará el PIB per cápita de todas las CCAA mediante transferencias del Fondo de Compensación"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 138.1 CE establece que «el Estado garantiza la realización efectiva del principio de solidaridad (…) velando por el establecimiento de un equilibrio económico, adecuado y justo entre las diversas partes del territorio español, y atendiendo en particular a las circunstancias del hecho insular». La mención expresa del hecho insular reconoce las especiales dificultades de los territorios insulares."},
  {p:"Según el artículo 146 CE, ¿quién elabora el proyecto de Estatuto en la vía ordinaria del artículo 143 CE?",ops:["Una Comisión técnica designada por el Gobierno central","Una asamblea compuesta por los miembros de la Diputación u órgano interinsular y por los Diputados y Senadores elegidos en las provincias afectadas","Los municipios interesados a través de una asamblea de alcaldes","La Comisión Constitucional del Congreso con participación de los representantes locales"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 146 CE establece que en la vía ordinaria el proyecto de Estatuto «será elaborado por una asamblea compuesta por los miembros de la Diputación u órgano interinsular de las provincias afectadas y por los Diputados y Senadores elegidos en ellas y será elevado a las Cortes Generales para su tramitación como ley». A diferencia de la vía del art. 151, aquí no hay referéndum ratificatorio."},
  {p:"¿Qué establece el artículo 155.2 CE sobre las instrucciones del Gobierno durante la aplicación de la coerción estatal?",ops:["El Gobierno solo puede dar instrucciones al Delegado del Gobierno, no a las autoridades autonómicas","Para la ejecución de las medidas previstas, el Gobierno podrá dar instrucciones a todas las autoridades de las Comunidades Autónomas","Las instrucciones del Gobierno deben ser ratificadas por el Senado para ser vinculantes","El Gobierno dará instrucciones únicamente al Presidente de la CCAA intervenida"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 155.2 CE establece que «para la ejecución de las medidas previstas en el apartado anterior, el Gobierno podrá dar instrucciones a todas las autoridades de las Comunidades Autónomas». Este poder de instrucción directa es la herramienta de ejecución de la coerción estatal, una vez cumplidos los requisitos del art. 155.1 CE."},
  {p:"La organización institucional del art. 152.1 CE exige que la Asamblea Legislativa autonómica sea elegida con un sistema electoral concreto. ¿Cuál?",ops:["Sistema mayoritario de doble vuelta para garantizar la gobernabilidad","Sistema de representación proporcional que asegure además la representación de las diversas zonas del territorio","Sistema mixto mayoritario-proporcional a elección del Estatuto","Sistema proporcional puro con circunscripción única autonómica"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 152.1 CE exige que la Asamblea Legislativa sea «elegida por sufragio universal, con arreglo a un sistema de representación proporcional que asegure, además, la representación de las diversas zonas del territorio». La proporcionalidad garantiza la pluralidad política y la representación territorial equilibra las diferentes zonas de la CCAA."},
  {p:"Según el artículo 157.3 CE, ¿qué tipo de norma puede regular el ejercicio de las competencias financieras de las CCAA, los conflictos entre ellas y la colaboración financiera?",ops:["Una ley ordinaria de las Cortes Generales aprobada por mayoría simple","Una ley orgánica","Un reglamento del Consejo de Ministros con informe del Consejo de Estado","Un acuerdo del Consejo de Política Fiscal y Financiera ratificado por las Cortes"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 157.3 CE establece que «mediante ley orgánica podrá regularse el ejercicio de las competencias financieras enumeradas en el precedente apartado 1, las normas para resolver los conflictos que pudieran surgir y las posibles formas de colaboración financiera entre las Comunidades Autónomas y el Estado». Esta ley orgánica es la LOFCA (LO 8/1980)."}
];

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function prepararPreguntas(){const m=shuffle(BANCO);return m.map(q=>{const ct=q.ops[q.c];const no=shuffle(q.ops);return{p:q.p,ops:no,c:no.indexOf(ct),exp:q.exp};});}
let preguntas=[],respondidas=0,correctas=0,incorrectas=0;
function actualizarBarra(){const pct=preguntas.length?(respondidas/preguntas.length)*100:0;document.getElementById('barraFill').style.width=pct+'%';document.getElementById('barraNum').textContent=respondidas+' / '+preguntas.length;document.getElementById('scoreOk').textContent='✓ '+correctas;document.getElementById('scoreKo').textContent='✗ '+incorrectas;}
function responder(qi,oi){const q=preguntas[qi];const btns=document.querySelectorAll('[data-qi="'+qi+'"]');btns.forEach(b=>b.disabled=true);btns.forEach((b,j)=>{if(j===q.c)b.classList.add('correcta');else if(j===oi&&oi!==q.c)b.classList.add('incorrecta');});document.getElementById('exp-'+qi).classList.add('visible');respondidas++;if(oi===q.c)correctas++;else incorrectas++;actualizarBarra();if(respondidas===preguntas.length)setTimeout(mostrarResultado,700);}
function mostrarResultado(){const pct=Math.round((correctas/preguntas.length)*100);document.getElementById('resPunt').innerHTML=correctas+' <span>/ '+preguntas.length+'</span>';document.getElementById('resCorr').textContent=correctas;document.getElementById('resIncorr').textContent=incorrectas;document.getElementById('resPct').textContent=pct+'%';let txt,col,bg;if(pct>=90){txt='🏆 Sobresaliente';col='#166534';bg='#f0fdf4';}else if(pct>=75){txt='✅ Notable';col='#1e3a5f';bg='#eff6ff';}else if(pct>=60){txt='📘 Aprobado';col='#92400e';bg='#fffbeb';}else{txt='❌ Insuficiente — ¡Sigue practicando!';col='#991b1b';bg='#fef2f2';}document.getElementById('resCalif').innerHTML='<span class="calif-badge" style="background:'+bg+';color:'+col+'">'+txt+'</span>';const el=document.getElementById('resultado');el.classList.add('visible');el.scrollIntoView({behavior:'smooth',block:'center'});}
function render(){respondidas=0;correctas=0;incorrectas=0;preguntas=prepararPreguntas();actualizarBarra();const main=document.getElementById('mainContent');main.innerHTML='';const letras=['A','B','C','D'];preguntas.forEach((q,i)=>{const card=document.createElement('div');card.className='card';card.innerHTML='<div class="card-num">Pregunta '+(i+1)+' de '+preguntas.length+'</div><div class="card-pregunta">'+q.p+'</div><div class="opciones">'+q.ops.map((op,j)=>'<button class="opcion" data-qi="'+i+'" onclick="responder('+i+','+j+')"><span class="letra">'+letras[j]+')</span><span>'+op+'</span></button>').join('')+'</div><div class="explicacion" id="exp-'+i+'">'+q.exp+'</div>';main.appendChild(card);});const sep=document.createElement('div');sep.className='divider';sep.textContent='Fin del test';main.appendChild(sep);const res=document.createElement('div');res.className='resultado';res.id='resultado';res.innerHTML='<div class="resultado-eyebrow">Resultado final</div><h2>Test completado</h2><div class="resultado-nota" id="resPunt">0 <span>/ 50</span></div><div id="resCalif"></div><div class="stats"><div class="stat"><div class="stat-num" id="resCorr" style="color:#166534">0</div><div class="stat-lab">Correctas</div></div><div class="stat"><div class="stat-num" id="resIncorr" style="color:#991b1b">0</div><div class="stat-lab">Incorrectas</div></div><div class="stat"><div class="stat-num" id="resPct">0%</div><div class="stat-lab">% aciertos</div></div></div><p class="resultado-hint">Desplázate hacia arriba para revisar las explicaciones de cada pregunta.</p><button class="btn btn-naranja" onclick="render();window.scrollTo({top:0,behavior:\'smooth\'})">↺ Repetir con nuevo orden</button>';main.appendChild(res);}
render();
</script>

</html>
